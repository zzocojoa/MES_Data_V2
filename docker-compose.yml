version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mes_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    command: ["postgres", "-c", "max_connections=50", "-c", "shared_buffers=64MB"]
    ports:
      - "15432:5432"
    volumes:
      - mes_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 300M

  api:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: mes_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
    working_dir: /app/api_server
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      # Mount pipeline data folders so files can be uploaded/downloaded locally on the NAS
      - ./ext_pipeline/data_in:/app/ext_pipeline/data_in
      - ./ext_pipeline/data_processed:/app/ext_pipeline/data_processed
      - ./ext_pipeline/data_error:/app/ext_pipeline/data_error
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 256M

  watcher:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: mes_watcher
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
    # Override default working dir and cmd to run watcher
    working_dir: /app/ext_pipeline
    command: ["python", "watcher.py"]
    volumes:
      # Shares the same folders as the API for consistency
      - ./ext_pipeline/data_in:/app/ext_pipeline/data_in
      - ./ext_pipeline/data_processed:/app/ext_pipeline/data_processed
      - ./ext_pipeline/data_error:/app/ext_pipeline/data_error
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 350M

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mes_web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mes_db_data:
