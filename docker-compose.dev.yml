version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mes_db_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      # Exposing on 15432 to exactly match the NAS environment configuration
      - "15432:5432"
    volumes:
      - mes_db_local_data:/var/lib/postgresql/data

volumes:
  mes_db_local_data:
